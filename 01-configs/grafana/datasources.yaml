apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus-ds.yaml: |  #ds stands for datasource
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus-ds
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc:9090
        isDefault: true
        editable: true