apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provision
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'Infrastructure'
        type: file
        disableDeletion: false
        editable: true
        options:  
          path: /var/lib/grafana/dashboards #inside the grafana container