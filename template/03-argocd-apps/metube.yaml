apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metube
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hankchi12345/gitops-manifests.git
    targetRevision: HEAD
    path: clusters/CLUSTER_ID/04-apps/metube
  destination:
    server: https://kubernetes.default.svc
    namespace: app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
