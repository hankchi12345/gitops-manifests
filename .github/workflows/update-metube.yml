name: Update MeTube Image

# 教學：兩種觸發方式
# 1. schedule — 每天凌晨 2 點 UTC 自動跑
# 2. workflow_dispatch — 在 GitHub Actions UI 手動點「Run workflow」
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要寫入權限才能 git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 教學：用 GitHub API 取得最新 release tag
      # jq 是 JSON 解析工具，-r 輸出純字串（不加引號）
      - name: Get latest MeTube release tag
        id: latest
        run: |
          TAG=$(curl -sf https://api.github.com/repos/alexta69/metube/releases/latest \
                | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest upstream tag: $TAG"

      # 教學：從 deployment.yaml 抓現有 tag
      # grep -oP 用 Perl regex 擷取 : 後面的版本號
      - name: Get current tag in repo
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=ghcr\.io/alexta69/metube:)\S+' \
            clusters/Master-5cf92/04-apps/metube/deployment.yaml | head -1)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current tag in repo: $CURRENT"

      # 教學：只有版本不同時才更新，避免無意義的 commit
      - name: Update image tag if changed
        if: steps.latest.outputs.tag != steps.current.outputs.current
        run: |
          NEW="${{ steps.latest.outputs.tag }}"
          # find 找出所有 cluster 的 metube deployment，統一更新
          # 這樣之後新增第二個 cluster 也會自動被更新
          find clusters -path "*/04-apps/metube/deployment.yaml" \
            -exec sed -i \
              "s|ghcr.io/alexta69/metube:.*|ghcr.io/alexta69/metube:${NEW}|g" \
              {} \;
          echo "Updated all clusters to $NEW"

      - name: Commit and push
        if: steps.latest.outputs.tag != steps.current.outputs.current
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clusters/
          git commit -m "chore: update metube ${{ steps.current.outputs.current }} → ${{ steps.latest.outputs.tag }}"
          git push
