apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
- datasources.yaml
- dashboards-provision.yaml
- sealed-secrets.yaml

configMapGenerator:
- name: grafana-dashboards
  files:
  - dash-json/kube-cluster-monitoring.json
  - dash-json/node-exporter.json
  options:
    disableNameSuffixHash: true