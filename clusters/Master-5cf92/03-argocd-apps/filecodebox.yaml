apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: filecodebox
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hankchi12345/app-manifests.git
    targetRevision: HEAD
    path: filecodebox
  destination:
    server: https://kubernetes.default.svc
    namespace: app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
