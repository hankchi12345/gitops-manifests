apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-prerequisite
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/longhorn/longhorn.git
    targetRevision: v1.12.0
    path: deploy/prerequisite
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
