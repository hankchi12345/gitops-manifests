apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-iscsi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://github.com/hankchi12345/gitops-manifests.git
    targetRevision: HEAD
    path: clusters/Master-5cf92/longhorn-iscsi
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
